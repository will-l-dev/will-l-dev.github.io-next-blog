name: Update theme

on:
  workflow_dispatch:  # disabled until site is live — re-add schedule when ready

jobs:
  update-theme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'  # intentionally latest — this job exists to update dependencies
          extended: true

      - name: Update theme
        run: hugo mod get -u

      - name: Tidy go.mod, go.sum
        run: hugo mod tidy

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: bump hugo-theme-stack to latest"
          title: "chore: bump hugo-theme-stack to latest"
          body: "Automated daily theme update. CI must pass before merging."
          branch: "chore/theme-update"
          delete-branch: true
