<div id="reading-progress"></div>
<button id="back-to-top" aria-label="Back to top">↑</button>

<script type="module">
import PhotoSwipeLightbox from 'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe-lightbox.esm.min.js';
const lightbox = new PhotoSwipeLightbox({
    gallery: '.article-content',
    children: 'a.pswp-link',
    pswpModule: () => import('https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.min.js')
});
lightbox.init();
</script>

<script>
// Reading progress bar
(function () {
    var bar = document.getElementById('reading-progress');
    if (!bar) return;
    function update() {
        var h   = document.documentElement;
        var pct = (h.scrollTop || document.body.scrollTop) /
                  (h.scrollHeight - h.clientHeight) * 100;
        bar.style.width = Math.min(pct, 100) + '%';
    }
    window.addEventListener('scroll', update, { passive: true });
    update();
}());

// Back to top button
(function () {
    var btn = document.getElementById('back-to-top');
    if (!btn) return;
    window.addEventListener('scroll', function () {
        btn.classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
    btn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
}());

// Session ratings
(function () {
    var meta = document.querySelector('meta[name="session-rating"]');
    if (!meta) return;
    var rating = parseInt(meta.getAttribute('content'), 10) || 0;
    if (rating === 0) return;
    var stars = '';
    for (var i = 1; i <= 5; i++) {
        stars += '<span class="star ' + (i <= rating ? 'star--filled' : 'star--empty') + '">★</span>';
    }
    var el = document.createElement('div');
    el.className = 'session-rating';
    el.innerHTML = stars;
    var target = document.querySelector('.article-content');
    if (target) target.insertAdjacentElement('beforebegin', el);
}());
</script>
